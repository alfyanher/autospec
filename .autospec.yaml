# AutoSpec Configuration
# Docs: https://github.com/alfyanher/autospec
# Regenerate: autospec generate
# ---

version: 1
project:
  name: autospec
  type: cli
generate:
  - architecture
  - onboarding
  - decisions
  - components
  - api
  - dependencies
  - claude
settings:
  tone: concise
  update_on: commit
  ignore:
    - node_modules/
    - dist/
    - build/
    - coverage/
    - "*.test.*"
    - "*.spec.*"
    - __tests__/
  max_depth: 4
  include_git_history: true
